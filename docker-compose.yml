version: "3.8"

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "8090:80"
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - merchant_net

  app:
    build:
      context: ./docker/php-fpm
      dockerfile: development/Dockerfile
    user: "1000:988"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PHP_IDE_CONFIG=serverName=localhost
    volumes:
      - ./src:/var/www/html:delegated
      - ./docker/php-fpm/common/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
      - ./docker/php-fpm/common/conf.d/security.ini:/usr/local/etc/php/conf.d/security.ini
    networks:
      - merchant_net

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6380:6379"
    networks:
      - merchant_net

networks:
  merchant_net:
    driver: bridge
